spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    username: discodeit_user
    password: discodeit1234
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate #직접 작성한 schema.sql과 엔티티 일치 여부 검증
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true # 가독성을 위해 추가
    open-in-view: false # 심화 과제 대비: OSIV 비활성화 권장

discodeit:
  storage:
    type: local
    local:
      root-path: ./storage/binary-contents